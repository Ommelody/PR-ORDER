<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>THAMC PR ORDER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --green:#047857; --green-d:#064e3b; --green-m:#059669; --green-soft:#e3f4ea;
  --ink:#12211b; --muted:#5b6b64; --line:#e8eeeb; --bg:#f4f8f6; --card:#fff;
  --amber:#b45309; --amber-bg:#fff3e2; --sidebar-w:240px; --sidebar-wc:74px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:'Sarabun',system-ui,sans-serif;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased}
.mono{font-family:'IBM Plex Mono',monospace}
button{font-family:inherit;cursor:pointer;border:0;background:none}
input,select,textarea{font-family:inherit}
.hidden{display:none!important}

/* ---------- AUTH ---------- */
#auth{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:22px;background:linear-gradient(135deg,#064e3b,#0b6b4a 55%,#059669)}
.auth-card{width:100%;max-width:420px;background:rgba(255,255,255,.07);backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.16);border-radius:22px;padding:32px;box-shadow:0 30px 60px -20px rgba(0,0,0,.4)}
.auth-logo{width:58px;height:58px;border-radius:16px;background:#fff;margin:0 auto;display:flex;align-items:center;justify-content:center;color:#064e3b;font-weight:700;font-size:20px}
.auth-card h1{color:#fff;font-size:22px;font-weight:700;text-align:center;margin:14px 0 2px}
.auth-sub{color:#9fe7c4;font-size:13px;text-align:center;margin-bottom:22px}
.auth-lbl{color:#9fe7c4;font-size:12.5px;margin-bottom:6px;display:block}
.auth-in{width:100%;background:transparent;border:0;border-bottom:2px solid rgba(255,255,255,.35);padding:9px 2px;color:#fff;font-size:14px;outline:none}
.auth-in:focus{border-color:#fff}
.auth-btn{width:100%;margin-top:18px;background:#facc15;color:#1a1a1a;font-weight:700;font-size:16px;padding:13px;border-radius:14px;box-shadow:0 8px 20px -8px rgba(250,204,21,.6)}
.auth-link{text-align:center;margin-top:18px;color:#9fe7c4;font-size:13px}
.auth-link b{color:#fff;cursor:pointer;text-decoration:underline}
.auth-msg{text-align:center;font-size:13px;margin-top:12px;min-height:18px}
.quick{display:flex;gap:8px;margin-top:16px}
.quick button{flex:1;font-size:11.5px;color:#dcfbe9;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:9px;padding:8px 4px;line-height:1.35}
.quick b{display:block;font-size:12px;color:#fff}

/* ---------- SHELL ---------- */
#app{display:flex;height:100dvh;overflow:hidden}
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:var(--green-d);color:#c9ede0;padding:18px 14px;display:flex;flex-direction:column;transition:width .22s ease}
body.collapsed .sidebar{width:var(--sidebar-wc)}
.sb-head{display:flex;align-items:center;gap:11px;padding:4px 6px 18px;border-bottom:1px solid rgba(255,255,255,.1);min-height:56px}
.sb-logo{width:38px;height:38px;border-radius:11px;background:var(--green-m);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex-shrink:0}
.sb-title{line-height:1.1;overflow:hidden;white-space:nowrap}
.sb-title b{color:#fff;font-weight:700;font-size:15px;display:block}
.sb-title span{font-size:10.5px;color:#8fe3bb}
body.collapsed .sb-title,body.collapsed .nav-label,body.collapsed .nav-badge,body.collapsed .sb-user-info{display:none}
.sb-nav{display:flex;flex-direction:column;gap:3px;margin-top:14px;flex:1;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:10px;font-size:13.5px;color:#c9ede0;white-space:nowrap;transition:background .15s;text-align:left;width:100%}
.nav-item:hover{background:rgba(255,255,255,.08)}
.nav-item.active{background:var(--green-m);color:#fff;font-weight:600}
.nav-ic{width:20px;text-align:center;flex-shrink:0;font-size:15px}
.nav-badge{margin-left:auto;background:#d97706;color:#fff;font-size:10.5px;font-weight:600;padding:1px 7px;border-radius:10px}
body.collapsed .nav-item{justify-content:center;padding:11px 0}
.sb-logout{display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:11px;background:rgba(220,38,38,.22);color:#fecaca;font-size:13px;margin-bottom:8px;white-space:nowrap;width:100%}
body.collapsed .sb-logout{justify-content:center}
.sb-user{display:flex;align-items:center;gap:11px;padding:10px;border-radius:11px;background:rgba(255,255,255,.06)}
.sb-ava{width:34px;height:34px;border-radius:50%;background:#8fd3b4;color:#064e3b;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.sb-user-info{min-width:0;overflow:hidden}
.sb-user-info b{color:#fff;font-size:13px;font-weight:600;display:block;white-space:nowrap;text-overflow:ellipsis;overflow:hidden}
.sb-user-info span{font-size:11px;color:#8fe3bb}
.main{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 22px;background:#fff;border-bottom:1px solid var(--line);flex-shrink:0}
.tb-left{display:flex;align-items:center;gap:12px;min-width:0}
.icon-btn{width:38px;height:38px;border-radius:10px;color:var(--muted);font-size:18px;display:flex;align-items:center;justify-content:center}
.icon-btn:hover{background:var(--bg)}
.tb-title{font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-ava{width:36px;height:36px;border-radius:50%;background:var(--green-d);color:#dcfbe9;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px}
.content{flex:1;overflow-y:auto;padding:22px;-webkit-overflow-scrolling:touch}

/* bits */
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px 20px}
.grid{display:grid;gap:14px}
.kpi{background:#fff;border-radius:14px;padding:15px 17px;box-shadow:0 10px 24px -14px rgba(6,78,59,.4)}
.kpi .l{font-size:12px;color:#7d8d85}
.kpi .v{font-size:24px;font-weight:700;margin-top:2px}
.btn{font-size:13px;font-weight:600;padding:9px 18px;border-radius:9px;display:inline-block}
.btn-p{background:var(--green);color:#fff}
.btn-o{background:#fff;border:1px solid #cdd9d3;color:var(--muted)}
.btn-x{background:var(--green-soft);border:1px solid #b9e3ca;color:#0a6b3c}
.btn-w{background:var(--amber-bg);color:#d97706}
.chip{font-size:11px;padding:3px 9px;border-radius:12px;font-weight:600;display:inline-block;white-space:nowrap}
.in{width:100%;border:1px solid #cdd9d3;border-radius:9px;padding:10px 12px;font-size:13.5px;outline:none;background:#fff}
.in:focus{border-color:var(--green);box-shadow:0 0 0 2px rgba(4,120,87,.18)}
.in[readonly]{background:#f4f8f6;color:#5b6b64}
.lbl{font-size:12.5px;color:#5b6b64;margin-bottom:5px;display:block}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead tr{background:var(--bg);color:var(--muted);text-align:left}
th{padding:11px 13px;font-weight:600}
td{padding:11px 13px;border-top:1px solid #eef4f1}
.tbl-wrap{overflow-x:auto;background:#fff;border:1px solid var(--line);border-radius:14px}
.rowc{cursor:pointer}.rowc:hover{background:#f7fbf9}
.demo-chip{position:fixed;bottom:14px;right:14px;z-index:60;background:#fffbe6;border:1px solid #f5e2a8;color:#8a6d00;font-size:11.5px;padding:7px 12px;border-radius:20px;box-shadow:0 4px 14px rgba(0,0,0,.1)}
.items-edit input{border:1px solid #dbe5e0;border-radius:7px;padding:8px;width:100%;font-size:12.5px}
.items-edit input:focus{border-color:var(--green);outline:none}

/* modal */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:70;display:none;align-items:center;justify-content:center;padding:20px}
#modal.show{display:flex}
.modal-card{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-card h3{margin:0 0 14px;font-size:16px}

/* mobile */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:45;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.show{opacity:1;pointer-events:auto}
.bottomnav{display:none}
@media (max-width:820px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:50;transform:translateX(-100%);transition:transform .24s ease;width:var(--sidebar-w)!important}
  body.drawer .sidebar{transform:translateX(0)}
  body.collapsed .sb-title,body.collapsed .nav-label,body.collapsed .nav-badge,body.collapsed .sb-user-info{display:revert}
  body.collapsed .nav-item{justify-content:flex-start;padding:11px 12px}
  .collapse-btn{display:none}
  .content{padding:16px 14px 88px}
  .grid.k4{grid-template-columns:1fr 1fr!important}
  .grid.c2,.grid.c3{grid-template-columns:1fr!important}
  .prdoc{padding:8mm}
  .bottomnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:40;background:#fff;border-top:1px solid var(--line);padding:6px 4px calc(6px + env(safe-area-inset-bottom));justify-content:space-around;box-shadow:0 -4px 16px rgba(0,0,0,.05)}
  .bn-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10.5px;color:#8a9a92;padding:4px 8px;border-radius:10px;flex:1}
  .bn-item .i{font-size:18px}
  .bn-item.active{color:var(--green)}
  .hamb{display:flex!important}
}
@media (min-width:821px){ .hamb{display:none} .scrim{display:none} }

/* A4 doc */
.doc-tools{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin:0 auto 14px;max-width:210mm}
.prdoc{width:210mm;max-width:100%;min-height:297mm;background:#fff;margin:0 auto;padding:12mm 14mm;box-shadow:0 4px 24px rgba(0,0,0,.12);color:#000;font-size:13.5px;line-height:1.55}
.prdoc .items{width:100%;border-collapse:collapse}
.prdoc .items th,.prdoc .items td{border:1px solid #000;padding:5px 7px;font-size:12.5px;vertical-align:top}
.dot{border-bottom:1px dotted #000;display:inline-block;min-width:60px}
@media print{
  @page{size:A4;margin:0}
  body *{visibility:hidden!important}
  #pr-doc,#pr-doc *{visibility:visible!important}
  #pr-doc{position:fixed;left:0;top:0;margin:0!important}
  .prdoc{box-shadow:none!important;margin:0!important}
  .no-print{display:none!important}
}
</style>
</head>
<body>

<!-- ============ AUTH ============ -->
<div id="auth">
  <div class="auth-card" id="loginCard">
    <div class="auth-logo">PR</div>
    <h1>THAMC PR ORDER</h1>
    <div class="auth-sub">ระบบเสนอความต้องการซื้อ · ศูนย์จัดซื้อและคลังพัสดุ</div>
    <label class="auth-lbl">ชื่อผู้ใช้ (อีเมล)</label>
    <input class="auth-in" id="liEmail" type="email" placeholder="email@thamc.go.th">

    <button class="auth-btn" onclick="doLogin()">เข้าสู่ระบบ</button>
    <div class="auth-msg" id="liMsg"></div>
    <div class="quick">
      <button onclick="quick('kamonwan@thamc.go.th')"><b>ผู้ขอซื้อ</b>กมลวรรณ</button>
      <button onclick="quick('thanakorn@thamc.go.th')"><b>จนท.พัสดุ</b>ธนกร</button>
      <button onclick="quick('sawarin@thamc.go.th')"><b>ผู้ดูแลระบบ</b>สวรินทร์</button>
    </div>
    <div class="auth-link">ยังไม่มีบัญชี? <b onclick="showAuth('register')">ลงทะเบียนที่นี่</b></div>
  </div>

  <div class="auth-card hidden" id="registerCard">
    <h1 style="margin-top:0">ลงทะเบียนผู้ใช้งาน</h1>
    <div class="grid" style="grid-template-columns:1fr 1fr;gap:14px">
      <div><label class="auth-lbl">ชื่อ-สกุล</label><input class="auth-in" id="rgName"></div>

      <div><label class="auth-lbl">เบอร์หน่วยงาน</label><input class="auth-in" id="rgPhone"></div>
      <div><label class="auth-lbl">หน่วยงาน</label><input class="auth-in" id="rgDept"></div>
      <div style="grid-column:span 2"><label class="auth-lbl">รหัสผ่าน</label><input class="auth-in" id="rgPass" type="password"></div>
    </div>
    <button class="auth-btn" onclick="doRegister()">ลงทะเบียน</button>
    <div class="auth-msg" id="rgMsg"></div>
    <div class="auth-link">มีบัญชีอยู่แล้ว? <b onclick="showAuth('login')">กลับไปเข้าสู่ระบบ</b></div>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <aside class="sidebar">
    <div class="sb-head"><div class="sb-logo">PR</div><div class="sb-title"><b>PR ORDER</b><span class="mono">THAMC Supply</span></div></div>
    <nav class="sb-nav" id="navList"></nav>
    <button class="sb-logout" onclick="logout()"><span class="nav-ic">⤶</span><span class="nav-label">ออกจากระบบ</span></button>
    <div class="sb-user"><div class="sb-ava" id="sbAva"></div><div class="sb-user-info"><b id="sbName"></b><span id="sbRole"></span></div></div>
  </aside>
  <div class="main">
    <div class="topbar">
      <div class="tb-left">
        <button class="icon-btn hamb" onclick="toggleDrawer()" style="display:none">☰</button>
        <button class="icon-btn collapse-btn" onclick="toggleCollapse()" title="ยืด/หดเมนู">⇄</button>
        <div class="tb-title" id="pageTitle"></div>
      </div>
      <div class="tb-ava" id="tbAva"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="scrim" id="scrim" onclick="toggleDrawer(false)"></div>
<nav class="bottomnav" id="bottomNav"></nav>
<div class="demo-chip" id="demoChip">ใช้งานในเครื่อง · ข้อมูลบันทึกอัตโนมัติ</div>

<div id="modal"><div class="modal-card"><h3 id="mTitle"></h3><div id="mBody"></div>
<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:18px"><button class="btn btn-o" onclick="closeModal()">ยกเลิก</button><button class="btn btn-p" id="mOk">ยืนยัน</button></div></div></div>

<script>

function syncRemote(action, args){
  if(!CONFIG.WEB_APP_URL) return;
  fetch(CONFIG.WEB_APP_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action,args})}).catch(()=>{});
}

             {t:"ตรวจรับสินค้า",by:"ศิริพร มั่นคง",at:new Date(now-0.9*D).toISOString()}] }
    ],
    seq: { ym:"202607", n:42 }
  };
  localStorage.setItem(LS_KEY, JSON.stringify(db));
  return db;
}
function nextPrId(){
  const d=new Date(), ym=String(d.getFullYear())+String(d.getMonth()+1).padStart(2,"0");
  if(DB.seq.ym!==ym){ DB.seq.ym=ym; DB.seq.n=0; }
  DB.seq.n++; return "PR-"+ym+"-"+String(DB.seq.n).padStart(4,"0");
}
function totals(items){
  const sub=(items||[]).reduce((s,it)=>s+(parseFloat(it.qty)||0)*(parseFloat(it.price)||0),0);
  const vat=sub*0.07; return {sub, vat, grand:sub+vat};
}
function money(n){ return Number(n).toLocaleString("th-TH",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtB(n){ return "฿"+Number(Math.round(n)).toLocaleString("th-TH"); }
function fmtDT(iso){ const d=new Date(iso); return d.toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"2-digit"})+" "+d.toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"}); }
function fmtD(iso){ return new Date(iso).toLocaleDateString("th-TH",{day:"numeric",month:"short",year:"2-digit"}); }
function fmtLong(iso){ return new Date(iso).toLocaleDateString("th-TH",{dateStyle:"long"}); }
function dur(ms){ if(ms<0)ms=0; const d=Math.floor(ms/86400e3), h=Math.floor(ms%86400e3/3600e3), m=Math.floor(ms%3600e3/60e3);
  return (d?d+" วัน ":"")+(h?h+" ชม. ":"")+(!d&&m?m+" นาที":"") || "ไม่กี่นาที"; }
function findPR(id){ return DB.prs.find(p=>p.id===id); }

function addItemRow(){
  const tr=document.createElement("tr");
  tr.innerHTML='<td><input class="it-name" placeholder="ชื่อรายการ..."></td><td><input class="it-code" placeholder="รหัส"></td>'+

    '<td style="text-align:center"><button style="color:#ef4444;font-weight:700" onclick="this.closest(\'tr\').remove();recalc()">✕</button></td>';
  document.getElementById("itemsBody").appendChild(tr);
  tr.querySelectorAll("input").forEach(i=>i.addEventListener("input",recalc));
}
function readItems(){
  return [...document.querySelectorAll("#itemsBody tr")].map(tr=>({
    name:tr.querySelector(".it-name").value.trim(), code:tr.querySelector(".it-code").value.trim(),
    qty:parseFloat(tr.querySelector(".it-qty").value)||0, unit:tr.querySelector(".it-unit").value.trim(),
    price:parseFloat(tr.querySelector(".it-price").value)||0, _tr:tr }));
}
function recalc(){
  const items=readItems();
  items.forEach(it=>{ it._tr.querySelector(".it-total").textContent=money(it.qty*it.price); });
  const t=totals(items);
  tSub.textContent=money(t.sub); tVat.textContent=money(t.vat); tGrand.textContent=money(t.grand);
}

  const items=readItems().filter(it=>it.name && it.qty>0).map(({_tr,...it})=>it);

  if(items.length===0){ msg.textContent="กรุณาเพิ่มรายการสินค้าอย่างน้อย 1 รายการ (ต้องมีชื่อและจำนวน)"; return; }
  if(!c1){ msg.textContent="กรุณาระบุประธานกรรมการตรวจรับ"; return; }
  const pr={ id:nextPrId(), at:new Date().toISOString(), requester:USER.name, email:USER.email,
    dept:USER.dept, phone:fPhone.value.trim(), reason, type:fType.value, urgency:fUrgency.value,

    log:[{t:"สร้างคำขอซื้อ",by:USER.name,at:new Date().toISOString()}] };

}

function drawQR(){
  try{ const pr=findPR(state.docId); if(!pr)return;
    const q=qrcode(0,"M"); q.addData(pr.id); q.make();
    const box=document.getElementById("qrbox"); if(box){ box.innerHTML=q.createImgTag(3,4);
      const img=box.querySelector("img"); if(img){img.style.width="100%";img.style.height="100%";img.style.imageRendering="pixelated";} }
  }catch(e){}
}

/* ---------- SAP Excel export (จากข้อมูลจริงของ PR) ---------- */
function exportSAP(id){
  if(!window.XLSX){ alert("กำลังโหลดไลบรารี กรุณาลองอีกครั้ง"); return; }
  const pr=findPR(id); if(!pr) return;
  const headers=["Type","Item No.","Item Description","Item Details","Vendor","Required Date","Required Qty.","UoM Group","UoM Code","UoM Name","Info Price","Gross Price","Discount %","Tax Code","Total (LC)","Whse","Project","Business Type","Department"];
  const rd=new Date(Date.now()+2*86400e3);
  const rds=String(rd.getDate()).padStart(2,"0")+"."+String(rd.getMonth()+1).padStart(2,"0")+"."+String(rd.getFullYear()).slice(2);
  const rows=pr.items.map(it=>({
    "Type":"","Item No.":it.code||"","Item Description":it.name,"Item Details":"","Vendor":(pr.po&&pr.po.vendor)||"",
    "Required Date":rds,"Required Qty.":it.qty,"UoM Group":it.unit||"","UoM Code":it.unit||"","UoM Name":it.unit||"",
    "Info Price":it.price,"Gross Price":it.price,"Discount %":0,"Tax Code":"IEH07",
    "Total (LC)":"THB "+Number(it.qty*it.price).toLocaleString("en-US",{minimumFractionDigits:2}),
    "Whse":pr.dept,"Project":"","Business Type":"","Department":pr.dept
  }));
  const ws=XLSX.utils.json_to_sheet(rows,{header:headers});
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"PR");
  XLSX.writeFile(wb,pr.id+"_SAP.xlsx");
}
